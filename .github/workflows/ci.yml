name: ci

on:
  pull_request:
  push:

jobs:
  build-and-test:
    uses: ./.github/workflows/ziggy-shared-ci.yml
    secrets: inherit
    with:
      verify_script: |
        if grep -qE '\.path = "\.\./Ziggy' build.zig.zon; then
          echo "Local path Ziggy dependencies are not allowed in CI"
          exit 1
        fi
        grep -q 'ziggy_spider_protocol' build.zig.zon
        grep -q 'ziggy_memory_store' build.zig.zon
        grep -q 'ziggy_tool_runtime' build.zig.zon
        grep -q 'ziggy_runtime_hooks' build.zig.zon
        grep -q 'ziggy_run_orchestrator' build.zig.zon
        grep -q '\.hash =' build.zig.zon
      extra_commands: |
        timeout 240 env SKIP_BUILD=1 bash test-env/test-distributed-workspace-matrix.sh
        timeout 240 env SKIP_BUILD=1 bash test-env/test-unified-v2-protocol.sh
        if ! command -v websocat >/dev/null 2>&1; then
          curl -fsSL -o /tmp/websocat https://github.com/vi/websocat/releases/download/v1.13.0/websocat.x86_64-unknown-linux-musl
          chmod +x /tmp/websocat
          sudo mv /tmp/websocat /usr/local/bin/websocat
        fi
        timeout 300 env SKIP_BUILD=1 ZIG_OUT_DIR=zig-out BIN_DIR=zig-out/bin RUN_PROVIDER_CHAT=auto CANARY_PROVIDER_NAME=openai-codex CANARY_PROVIDER_MODEL=gpt-5.3-codex ./scripts/mother-agent-e2e-suite.sh

  windows-fs-tests:
    name: windows-fs-tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Zig version
        run: zig version

      - name: Run Windows FS adapter tests
        run: zig test src/fs_windows_source_adapter.zig

      - name: Run router and node ops tests
        run: |
          zig test src/fs_router.zig
          zig test src/fs_node_ops.zig --test-filter "windows source"
