name: ci

on:
  pull_request:
  push:

jobs:
  build-and-test:
    uses: ./.github/workflows/ziggy-shared-ci.yml
    secrets: inherit
    with:
      verify_script: |
        set -euo pipefail
        if grep -qE '\.path = "\.\./Ziggy' build.zig.zon; then
          echo "Local path Ziggy dependencies are not allowed in CI"
          exit 1
        fi
        grep -q 'spider_protocol' build.zig.zon
        grep -q 'deps/spider-protocol' build.zig.zon
        grep -q 'ziggy_memory_store' build.zig.zon
        grep -q 'ziggy_tool_runtime' build.zig.zon
        grep -q 'ziggy_runtime_hooks' build.zig.zon
        grep -q 'ziggy_run_orchestrator' build.zig.zon
        grep -q '\.path = "deps/ziggy-piai"' build.zig.zon
        grep -q '\.path = "deps/spider-protocol"' build.zig.zon
        grep -q '\.path = "deps/ziggy-memory-store"' build.zig.zon
        grep -q '\.path = "deps/ziggy-tool-runtime"' build.zig.zon
        grep -q '\.path = "deps/ziggy-runtime-hooks"' build.zig.zon
        grep -q '\.path = "deps/ziggy-run-orchestrator"' build.zig.zon
        grep -q '".gitmodules"' build.zig.zon
      extra_commands: |
        timeout 240 env SKIP_BUILD=1 bash test-env/test-unified-v2-protocol.sh
        if [[ "${RUN_SANDBOX_CI_TESTS:-0}" == "1" ]]; then
          timeout 240 env SKIP_BUILD=1 bash test-env/test-distributed-workspace-matrix.sh
          curl -fsSL -o /tmp/websocat-ci https://github.com/vi/websocat/releases/download/v1.13.0/websocat.x86_64-unknown-linux-musl
          chmod +x /tmp/websocat-ci
          timeout 300 env SKIP_BUILD=1 ZIG_OUT_DIR=zig-out BIN_DIR=zig-out/bin RUN_PROVIDER_CHAT=auto CANARY_PROVIDER_NAME=openai-codex CANARY_PROVIDER_MODEL=gpt-5.3-codex WEBSOCAT_BIN=/tmp/websocat-ci MOTHER_E2E_ALLOW_SANDBOX_UNAVAILABLE_SKIP=1 ./scripts/mother-agent-e2e-suite.sh
        else
          echo "[ci] RUN_SANDBOX_CI_TESTS!=1; skipping sandbox-dependent matrix + mother-e2e suite."
        fi

  standalone-client-linux:
    uses: ./.github/workflows/ziggy-shared-ci.yml
    secrets: inherit
    with:
      build_command: zig build fs-mount
      test_command: zig build test-fs-mount

  windows-fs-tests:
    name: windows-fs-tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Zig version
        run: zig version

      - name: Run Windows FS adapter tests
        run: zig test src/venoms/fs/shared/fs_windows_source_adapter.zig

      - name: Build standalone fs mount client
        run: zig build fs-mount

      - name: Run standalone fs mount client tests
        run: zig build test-fs-mount

      - name: Run Windows node ops tests
        run: |
          zig test src/venoms/fs/shared/fs_node_ops.zig --test-filter "windows source"
